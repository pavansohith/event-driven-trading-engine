services:
  - type: web
    name: trading-api
    env: node
    rootDir: apps/api
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && cd apps/api && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Add your other environment variables in Render dashboard

